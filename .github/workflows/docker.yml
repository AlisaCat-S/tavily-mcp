name: Docker Image CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (leave empty for auto short SHA)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "IMAGE_TAG=$SHORT_SHA" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by architecture
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/tavily-mcp-server:${{ env.IMAGE_TAG }}-${{ matrix.platform.arch }}
          cache-from: type=gha,scope=build-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform.arch }}

  merge:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "IMAGE_TAG=$SHORT_SHA" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/tavily-mcp-server:${{ env.IMAGE_TAG }} \
            -t ghcr.io/${{ env.OWNER_LC }}/tavily-mcp-server:latest \
            ghcr.io/${{ env.OWNER_LC }}/tavily-mcp-server:${{ env.IMAGE_TAG }}-amd64 \
            ghcr.io/${{ env.OWNER_LC }}/tavily-mcp-server:${{ env.IMAGE_TAG }}-arm64
