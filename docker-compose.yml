services:
  tavily-mcp:
    image: ghcr.io/alisacat-s/tavily-mcp-server:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.server
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - TAVILY_API_BASE_URL=${TAVILY_API_BASE_URL:-https://api.tavily.com}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_PORT=3000
      - NODE_OPTIONS=--max-old-space-size=512
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      - tavily-mcp
    restart: unless-stopped
